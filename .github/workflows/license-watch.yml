name: Weekly license & maintenance watch

on:
  schedule:
    - cron: '0 6 * * 1' # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: License watch
        run: npm run watch:license
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Maintenance check
        run: npm run watch:maintenance
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Transitive walk (Layer 2) on the published catalog tree
        run: npx tsx enforcement/cli.ts layer2 --tree . || true

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: watch-reports
          path: reports/
          if-no-files-found: warn

      - name: Open an issue if drift was detected
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const read = (p) => { try { return fs.readFileSync(p, 'utf8'); } catch { return ''; } };
            const license = read('reports/license-watch.md');
            const maintenance = read('reports/maintenance-check.md');
            const licenseDrift = /⚠️|Entries with license signals: [1-9]/.test(license);
            const statusDrift = /Status changes: [1-9]/.test(maintenance);
            if (!licenseDrift && !statusDrift) {
              core.info('No drift detected; not opening an issue.');
              return;
            }
            const today = new Date().toISOString().slice(0, 10);
            const body = [
              `Automated weekly watch detected drift on ${today}.`,
              '',
              '## License watch', '', license || '_no report_',
              '', '## Maintenance check', '', maintenance || '_no report_',
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Weekly watch: drift detected (${today})`,
              body,
              labels: ['maintenance', 'automated'],
            });
