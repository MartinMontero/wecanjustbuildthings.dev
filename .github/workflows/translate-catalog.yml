name: Translate catalog (es + ar)

# On-demand machine translation of catalog entry prose into Spanish and Arabic,
# using the Anthropic (Claude) API. Runs scripts/translate-catalog.ts and opens a
# pull request with the generated entries for native review — translations are
# never merged automatically (each entry carries `machine_translated: true`).
#
# This is deliberately SEPARATE from the site build, which stays offline and
# deterministic. Requires an `ANTHROPIC_API_KEY` repository secret.
#
# Incrementality: the generator skips entries whose output file already exists,
# so the committed translations are the resume state — run it in waves (raise
# `limit`, or merge a wave and re-run) and each run continues where the last
# stopped. No cross-run cache is needed.

on:
  workflow_dispatch:
    inputs:
      lang:
        description: 'Target languages (comma-separated: es, ar)'
        type: string
        default: 'es,ar'
      limit:
        description: 'Max NEW entries to translate this run (blank = all remaining)'
        type: string
        default: '200'
      model:
        description: 'Claude model id'
        type: string
        default: 'claude-sonnet-4-6'
      force:
        description: 'Re-translate entries that already have output files'
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  # Serialize runs so two waves never push competing branches / duplicate work.
  group: translate-catalog
  cancel-in-progress: false

jobs:
  translate:
    name: Translate catalog prose and open a PR
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write # push the translation branch
      pull-requests: write # open the review PR
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          # Audit (not block): this job must reach the Anthropic API, the npm
          # registry, and GitHub; audit logs egress without an allowlist to
          # maintain (matches build-attest.yml).
          egress-policy: audit
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false # we push with an explicit token below
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0 # zizmor: ignore[cache-poisoning]
        with:
          node-version: '22'
      - run: npm ci

      - name: Generate translations
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Route inputs through env (not inline ${{ }} in run:) to avoid shell
          # template injection.
          LANG_INPUT: ${{ inputs.lang }}
          LIMIT_INPUT: ${{ inputs.limit }}
          MODEL_INPUT: ${{ inputs.model }}
          FORCE_INPUT: ${{ inputs.force }}
        run: |
          set -euo pipefail
          if [ -z "${ANTHROPIC_API_KEY:-}" ]; then
            echo "::error::ANTHROPIC_API_KEY secret is not set. Add it in repo Settings → Secrets → Actions." >&2
            exit 1
          fi
          args=(--provider anthropic --lang "$LANG_INPUT" --model "$MODEL_INPUT")
          if [ -n "${LIMIT_INPUT:-}" ]; then args+=(--limit "$LIMIT_INPUT"); fi
          if [ "${FORCE_INPUT:-false}" = "true" ]; then args+=(--force); fi
          npm run translate:catalog -- "${args[@]}"

      - name: Build to validate the generated MDX
        run: npm run build

      - name: Open a pull request with the translations
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          paths="src/content/docs/es/catalog src/content/docs/ar/catalog"
          if [ -z "$(git status --porcelain -- $paths)" ]; then
            echo "No new translations to commit — nothing to do."
            exit 0
          fi
          branch="machine-translations/run-${RUN_ID}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add -- $paths
          git commit -m "i18n: machine-translated catalog entries (pending native review)"
          git push "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git" "HEAD:${branch}"
          gh pr create \
            --repo "$REPO" \
            --base main \
            --head "$branch" \
            --title "i18n: machine-translated catalog entries (es + ar)" \
            --body "Automated run of \`scripts/translate-catalog.ts\` (Claude). Each entry carries \`machine_translated: true\` and needs a native speaker's pass before it is considered final. Generated by the \`Translate catalog\` workflow."
