name: Enforcement & checks

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Schema validation (astro check)
        run: npm run check

      - name: Typecheck the enforcement engine & scripts
        run: npm run typecheck:tools

      - name: Typecheck the Worker
        run: npm run typecheck:worker

      - name: Enforcement engine test suite
        run: npm test

      - name: Three-layer enforcement (catalog + recipes)
        run: npm run enforce

      - name: Three-layer enforcement (this repo's own tree — dogfood Layers 1–2)
        run: npx tsx enforcement/cli.ts layer1 --tree . && npx tsx enforcement/cli.ts layer2 --tree .

      - name: Build
        run: npm run build

      # Internal links are a hard gate: a broken on-site link (nav, anchor, asset)
      # must fail the build. External http(s) URLs are excluded from this step.
      - name: Dead-link check (internal — blocking)
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          # Resolve root-relative links (/about/, /fonts/*) against the built site
          # — lychee >=0.18 hard-errors on them otherwise. --root-dir must be absolute.
          args: --config lychee.toml --exclude '^https?://' --root-dir ${{ github.workspace }}/dist ./src
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # External links rot and time out transiently (third-party sites that are
      # slow or block CI IPs). Report them in the job summary, but never flake the
      # build on them — the weekly watch re-checks the catalog against live sources.
      - name: Dead-link check (external — non-blocking)
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          args: --config lychee.toml --root-dir ${{ github.workspace }}/dist ./src
          fail: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
