name: E2E (island behavior)

# Additive gate (NOT part of the protected operational_advisory set). Drives the real
# hydrated Svelte islands in headless Chromium against the built site — coverage the
# in-process unit suite can't provide. Mirrors the quality.yml a11y job's setup.
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Install Chromium for Playwright
        run: npx playwright install --with-deps chromium
      - name: E2E island behavior
        run: npm run test:e2e
