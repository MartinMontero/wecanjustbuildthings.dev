name: Build provenance & SBOM

# Generates a Software Bill of Materials (CycloneDX + SPDX) for the build, verifies
# npm registry provenance for the dependencies, and attests SLSA build provenance
# for the deployable site artifact. The attestation is verifiable with
# `gh attestation verify`, `cosign`, or `slsa-verifier` (see SECURITY.md).

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-attest-${{ github.ref }}
  cancel-in-progress: true

jobs:
  attest:
    name: SBOM + provenance for the site artifact
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write # keyless signing via Sigstore/Fulcio
      attestations: write # write the build-provenance attestation
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false
      # setup-node has no `cache:` input here, so it populates no cache — there is
      # nothing for a cache-poisoning attack to target on this attested build.
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0 # zizmor: ignore[cache-poisoning]
        with:
          node-version: '22'
      - run: npm ci
      - name: Verify npm dependency provenance / registry signatures
        run: npm audit signatures
      - name: Build the site
        run: npm run build
      - name: Package the deployable artifact (single subject for attestation)
        run: tar -czf site-dist.tar.gz -C dist .
      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cdx.json
          artifact-name: sbom.cdx.json
      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json
          artifact-name: sbom.spdx.json
      - name: Attest build provenance for the site artifact
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
        with:
          subject-path: site-dist.tar.gz
      - name: Upload SBOMs + artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sbom-and-artifact
          path: |
            sbom.cdx.json
            sbom.spdx.json
            site-dist.tar.gz
          if-no-files-found: warn
